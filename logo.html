<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snap Terminal — Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 80px;
    font-family: 'Space Mono', monospace;
    padding: 60px 40px;
  }

  /* ── VARIANT 1: Dark, primary ── */
  .logo-dark {
    background: #0d0d14;
    border: 1px solid #1e1e2e;
    border-radius: 16px;
    padding: 52px 64px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    overflow: hidden;
  }

  .logo-dark::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .icon-wrap {
    width: 52px;
    height: 52px;
    background: #6366f1;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 0 0 1px rgba(99,102,241,0.4), 0 8px 24px rgba(99,102,241,0.3);
  }

  .icon-wrap svg {
    width: 26px;
    height: 26px;
  }

  .text-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .wordmark {
    display: flex;
    align-items: baseline;
    gap: 0;
    line-height: 1;
  }

  .word-snap {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 28px;
    color: #ffffff;
    letter-spacing: -0.5px;
  }

  .word-terminal {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 28px;
    color: #6366f1;
    letter-spacing: -0.5px;
  }

  .dot-sep {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 28px;
    color: #4ade80;
    margin: 0 1px;
  }

  .tagline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 11px;
    color: #4a4a6a;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ── VARIANT 2: Light ── */
  .logo-light {
    background: #ffffff;
    border: 1px solid #e8e8f0;
    border-radius: 16px;
    padding: 52px 64px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
  }

  .logo-light::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 50% 80% at 10% 50%, rgba(99,102,241,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo-light .word-snap { color: #0a0a14; }
  .logo-light .word-terminal { color: #6366f1; }
  .logo-light .tagline { color: #9999b8; }

  /* ── VARIANT 3: Compact / icon only + short name ── */
  .logo-compact {
    background: #0d0d14;
    border: 1px solid #1e1e2e;
    border-radius: 12px;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .icon-sm {
    width: 32px;
    height: 32px;
    background: #6366f1;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(99,102,241,0.35);
  }

  .icon-sm svg { width: 17px; height: 17px; }

  .compact-name {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 17px;
    color: #ffffff;
    letter-spacing: -0.3px;
  }

  .compact-name span { color: #6366f1; }

  /* ── VARIANT 4: Monoline wordmark, no icon ── */
  .logo-wordmark {
    background: #0d0d14;
    border: 1px solid #1e1e2e;
    border-radius: 16px;
    padding: 48px 64px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .logo-wordmark::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #6366f1, #4ade80, transparent);
  }

  .wm-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .wm-bracket {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 36px;
    color: #4ade80;
    line-height: 1;
    opacity: 0.7;
  }

  .wm-snap {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 36px;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1;
  }

  .wm-terminal {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 36px;
    color: #6366f1;
    letter-spacing: -1px;
    line-height: 1;
  }

  .wm-cursor {
    display: inline-block;
    width: 3px;
    height: 32px;
    background: #4ade80;
    margin-left: 4px;
    border-radius: 1px;
    animation: blink 1.1s step-end infinite;
    vertical-align: middle;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .wm-sub {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 11px;
    color: #3a3a5a;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding-left: 2px;
  }

  /* labels */
  .label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: #3a3a5a;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    margin-top: -60px;
  }

  .label-light { color: #aaaacc; }

  .section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 600px;
  }
</style>
</head>
<body>

  <!-- Variant 1: Primary dark -->
  <div class="section">
    <div class="logo-dark">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="3" width="20" height="16" rx="2" stroke="white" stroke-width="1.5"/>
          <path d="M6 8l4 4-4 4" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 16h5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/>
        </svg>
      </div>
      <div class="text-group">
        <div class="wordmark">
          <span class="word-snap">Snap</span><span class="dot-sep">.</span><span class="word-terminal">terminal</span>
        </div>
        <div class="tagline">Terminal Screenshot Generator</div>
      </div>
    </div>
    <div class="label">Primary — Dark</div>
  </div>

  <!-- Variant 2: Light -->
  <div class="section">
    <div class="logo-light">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="3" width="20" height="16" rx="2" stroke="white" stroke-width="1.5"/>
          <path d="M6 8l4 4-4 4" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 16h5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/>
        </svg>
      </div>
      <div class="text-group">
        <div class="wordmark">
          <span class="word-snap">Snap</span><span class="dot-sep">.</span><span class="word-terminal">terminal</span>
        </div>
        <div class="tagline">Terminal Screenshot Generator</div>
      </div>
    </div>
    <div class="label label-light">Secondary — Light</div>
  </div>

  <!-- Variant 3: Compact -->
  <div class="section">
    <div class="logo-compact">
      <div class="icon-sm">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="3" width="20" height="16" rx="2" stroke="white" stroke-width="1.5"/>
          <path d="M6 8l4 4-4 4" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 16h5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.4"/>
        </svg>
      </div>
      <div class="compact-name">Snap<span>.</span>terminal</div>
    </div>
    <div class="label">Compact — Nav / Mobile</div>
  </div>

  <!-- Variant 4: Wordmark with cursor -->
  <div class="section">
    <div class="logo-wordmark">
      <div class="wm-top">
        <span class="wm-bracket">[</span>
        <span class="wm-snap">snap</span><span class="wm-terminal">terminal</span><span class="wm-bracket">]</span>
        <span class="wm-cursor"></span>
      </div>
      <div class="wm-sub">Terminal Screenshot Generator</div>
    </div>
    <div class="label">Wordmark — Hero / OG Image</div>
  </div>

</body>
</html>
